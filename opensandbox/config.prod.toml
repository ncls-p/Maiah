[server]
host = "0.0.0.0"
port = 8090
max_sandbox_timeout_seconds = 900

[log]
level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.20"

[storage]
allowed_host_paths = []
volume_default_size = "1Gi"

[store]
type = "sqlite"
path = "~/.opensandbox/opensandbox.db"

[docker]
network_mode = "bridge"
# Production app/worker containers reach host-published sandbox endpoints through
# Docker's host gateway. docker-compose.prod.yml injects this hostname into app
# and worker with extra_hosts.
host_ip = "host.docker.internal"
drop_capabilities = [
  "AUDIT_WRITE",
  "MKNOD",
  "NET_ADMIN",
  "NET_RAW",
  "SYS_ADMIN",
  "SYS_MODULE",
  "SYS_PTRACE",
  "SYS_TIME",
  "SYS_TTY_CONFIG",
]
no_new_privileges = true
apparmor_profile = ""
pids_limit = 4096
seccomp_profile = ""

[ingress]
mode = "direct"

[egress]
image = "opensandbox/egress:v1.1.3"
mode = "dns"

[renew_intent]
enabled = false
min_interval_seconds = 60
