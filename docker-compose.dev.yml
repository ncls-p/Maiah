name: ai-hub-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${AI_HUB_DEV_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ai_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "${AI_HUB_DEV_DRAGONFLY_PORT:-16379}:6379"
    volumes:
      - dragonfly-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: ["/data"]
    ports:
      - "${AI_HUB_DEV_RUSTFS_S3_PORT:-13900}:9000"
      - "${AI_HUB_DEV_RUSTFS_CONSOLE_PORT:-13901}:9001"
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-rustfsadminrustfsadmin}
    volumes:
      - rustfs-dev-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          code="$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/)" && { test "$$code" = "200" || test "$$code" = "403"; }
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: amazon/aws-cli:2.32.3
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-rustfsadminrustfsadmin}
      AWS_DEFAULT_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        endpoint="http://rustfs:9000"
        for attempt in $$(seq 1 30); do
          if aws --endpoint-url "$$endpoint" s3api list-buckets >/dev/null 2>&1; then
            break
          fi
          if [ "$$attempt" = "30" ]; then
            echo "RustFS S3 API was not ready after 30 attempts." >&2
            exit 1
          fi
          sleep 1
        done
        if ! aws --endpoint-url "$$endpoint" s3api head-bucket --bucket "$${AWS_BUCKET}" >/dev/null 2>&1; then
          aws --endpoint-url "$$endpoint" s3api create-bucket --bucket "$${AWS_BUCKET}"
        fi

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${AI_HUB_DEV_SEARXNG_PORT:-18088}:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:${AI_HUB_DEV_SEARXNG_PORT:-18088}/
    restart: unless-stopped

  opensandbox-server:
    image: opensandbox/server:latest
    restart: unless-stopped
    ports:
      - "${AI_HUB_DEV_OPENSANDBOX_PORT:-18090}:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./opensandbox/config.dev.toml:/etc/opensandbox/config.toml:ro
      - opensandbox-dev-data:/root/.opensandbox
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      OPENSANDBOX_SERVER_API_KEY: ${OPENSANDBOX_API_KEY:-ai-hub-dev-opensandbox-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8090/health'', timeout=3).read()"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres-dev-data:
  dragonfly-dev-data:
  opensandbox-dev-data:
  rustfs-dev-data:
